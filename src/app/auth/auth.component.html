@if (authService.user(); as user) {
  <div class="auth-inline">
    <button
      class="avatar-badge"
      type="button"
      (click)="toggleDropdown()"
      [attr.aria-label]="user.displayName + ' menu'"
      [attr.aria-expanded]="dropdownOpen"
      aria-haspopup="true"
    >
      {{ authService.initials() }}
    </button>
    @if (dropdownOpen) {
      <div class="dropdown-menu" role="menu">
        <button class="dropdown-item" type="button" role="menuitem" (click)="onProfile()">Profile</button>
        <button class="dropdown-item" type="button" role="menuitem" (click)="onLogout()">Log out</button>
      </div>
    }
  </div>
} @else {
  <div class="auth-inline">
    <button
      class="login-btn"
      type="button"
      (click)="toggleDropdown()"
      [attr.aria-expanded]="dropdownOpen"
      aria-haspopup="true"
    >
      Log in
    </button>
    @if (dropdownOpen) {
      <div class="dropdown-menu login-dropdown" role="menu">
        <div class="login-fields">
          <input
            type="text"
            class="login-input"
            placeholder="Username"
            [(ngModel)]="loginUsername"
            (keyup.enter)="onLogin()"
            autocomplete="username"
          />
          <div class="password-input-wrap">
            <input
              class="login-input"
              placeholder="Password"
              [type]="showLoginPassword ? 'text' : 'password'"
              [(ngModel)]="loginPassword"
              (keyup.enter)="onLogin()"
              autocomplete="current-password"
            />
            <button
              type="button"
              class="password-toggle"
              (click)="toggleLoginPasswordVisibility()"
              [attr.aria-label]="showLoginPassword ? 'Hide password' : 'Show password'"
            >
              {{ showLoginPassword ? "🙈" : "👁" }}
            </button>
          </div>
          @if (loginError) {
            <div class="login-error" role="alert">{{ loginError }}</div>
          }
          <button class="login-submit" type="button" (click)="onLogin()">Sign in</button>
        </div>
      </div>
    }
  </div>
}
